<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Delivery - Account Portal</title>
    <style>
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background: linear-gradient(135deg, #0d2b45, #203c56, #3c5a78); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .brand-logo {
            font-size: 32px;
            font-weight: 900;
            color: #f7d100; 
            background: #1c1c1c;
            padding: 5px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .brand-logo span { color: #fff; }

        .auth-card { 
            background: white; 
            padding: 35px 30px; 
            border-radius: 24px; 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15); 
            width: 100%;
            max-width: 400px; 
            box-sizing: border-box;
            border: 1px solid #eaeaea;
            text-align: center;
        }

        h2 { margin: 0 0 8px 0; color: #1c1c1c; font-size: 22px; font-weight: 700; }
        p { margin: 0 0 25px 0; color: #666; font-size: 14px; }

        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; font-size: 13px; }

        input, textarea { 
            width: 100%; 
            padding: 14px; 
            background: #f4f6f9;
            border: 1px solid #e2e8f0; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 15px; 
            color: #1a202c;
            transition: all 0.2s ease;
        }
        input:focus, textarea:focus {
            border-color: #f7d100;
            background: #fff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(247, 209, 0, 0.2);
        }
        textarea { resize: none; height: 75px; }

        .btn-brand { 
            background: #1c1c1c; 
            color: #f7d100; 
            border: none; 
            padding: 16px; 
            font-size: 16px; 
            border-radius: 14px; 
            cursor: pointer; 
            font-weight: 700; 
            width: 100%; 
            margin-top: 10px; 
            box-shadow: 0 6px 16px rgba(0,0,0,0.1);
        }

        .toggle-link {
            margin-top: 20px;
            font-size: 14px;
            color: #0d2b45;
            cursor: pointer;
            font-weight: bold;
            text-decoration: underline;
            display: inline-block;
        }

        #status { 
            color: #fff; 
            font-weight: 600; 
            text-align: center; 
            margin-top: 15px; 
            font-size: 14px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="brand-logo">Quick<span>delivery</span></div>

    <div class="auth-card">
        <h2 id="formTitle">Welcome to Delivery!</h2>
        <p id="formSubTitle">Let's get your details for lightning-fast orders</p>
        
        <form id="authForm" onsubmit="handleAuth(event)">
            <div class="form-group" id="nameGroup">
                <label>👤 AAPKA NAAM (FULL NAME)</label>
                <input type="text" id="userName" placeholder="e.g. Adnan Khan">
            </div>

            <div class="form-group">
                <label>📞 MOBILE NUMBER</label>
                <input type="tel" id="userPhone" placeholder="e.g. 9236099823" required>
            </div>

            <div class="form-group" id="addressGroup">
                <label>📍 DELIVERY ADDRESS</label>
                <textarea id="userAddress" placeholder="Flat/House No, Gali, Landmark, Kanpur"></textarea>
            </div>

            <button type="submit" id="submitBtn">Continue to Dashboard</button>
        </form>

        <div class="toggle-link" id="toggleModeBtn" onclick="toggleMode()">Already have an account? Login Here</div>
        <p id="status"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCekLRfgBi_HBJJmHLqsgj4b5II4CT6Iuw",
            authDomain: "store-2613b.firebaseapp.com",
            projectId: "store-2613b",
            storageBucket: "store-2613b.firebasestorage.app",
            messagingSenderId: "216192871587",
            appId: "1:216192871587:web:431c15db165045d8c42316"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let isLoginMode = false; // By default user register screen par hoga

        // Mode change karne ka logic (Register 🔄 Login)
        window.toggleMode = function() {
            isLoginMode = !isLoginMode;
            const nameGroup = document.getElementById('nameGroup');
            const addressGroup = document.getElementById('addressGroup');
            const formTitle = document.getElementById('formTitle');
            const formSubTitle = document.getElementById('formSubTitle');
            const submitBtn = document.getElementById('submitBtn');
            const toggleModeBtn = document.getElementById('toggleModeBtn');

            if(isLoginMode) {
                nameGroup.style.display = 'none';
                addressGroup.style.display = 'none';
                document.getElementById('userName').required = false;
                document.getElementById('userAddress').required = false;
                
                formTitle.innerText = "Welcome Back!";
                formSubTitle.innerText = "Enter your registered number to login";
                submitBtn.innerText = "Login Now";
                toggleModeBtn.innerText = "New User? Create an Account";
            } else {
                nameGroup.style.display = 'block';
                addressGroup.style.display = 'block';
                document.getElementById('userName').required = true;
                document.getElementById('userAddress').required = true;

                formTitle.innerText = "Welcome to Delivery!";
                formSubTitle.innerText = "Let's get your details for lightning-fast orders";
                submitBtn.innerText = "Continue to Dashboard";
                toggleModeBtn.innerText = "Already have an account? Login Here";
            }
        }

        // Main Trigger Form Submit Hone Par
        window.handleAuth = async function(event) {
            event.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const status = document.getElementById('status');
            const phone = document.getElementById('userPhone').value.trim();

            submitBtn.disabled = true;
            status.style.color = "#fff";

            if (isLoginMode) {
                // =============== 🔑 LOGIN LOGIC ===============
                status.innerText = "Checking database... ⏳";

                try {
                    // Firebase Query: Users collection me check karo yeh number hai ya nahi
                    const q = query(collection(db, "users"), where("userPhone", "==", phone));
                    const querySnapshot = await getDocs(q);

                    if (querySnapshot.empty) {
                        status.style.color = "#ff4a4a";
                        status.innerText = "Error: Is number se koi account nahi mila! Pehle Register karein.";
                        submitBtn.disabled = false;
                    } else {
                        // Agar user mil gaya toh uska data nikaalo
                        let loggedInUser = null;
                        querySnapshot.forEach((doc) => {
                            loggedInUser = { id: doc.id, ...doc.data() };
                        });

                        status.style.color = "#00ff66";
                        status.innerText = `Welcome back, ${loggedInUser.userName}! Loading dashboard... 🚀`;

                        setTimeout(() => {
                            window.location.href = `user_dashboard.html?uid=${loggedInUser.id}&name=${encodeURIComponent(loggedInUser.userName)}`;
                        }, 1200);
                    }
                } catch (error) {
                    status.style.color = "#ff4a4a";
                    status.innerText = "Login Error: " + error.message;
                    submitBtn.disabled = false;
                }

            } else {
                // =============== 📝 REGISTER LOGIC ===============
                const name = document.getElementById('userName').value.trim();
                const address = document.getElementById('userAddress').value.trim();
                
                status.innerText = "Creating professional profile... ⏳";

                try {
                    // Ek chota check ki register karne wala number pehle se toh nahi hai
                    const q = query(collection(db, "users"), where("userPhone", "==", phone));
                    const checkSnap = await getDocs(q);
                    if(!checkSnap.empty) {
                        status.style.color = "#ff4a4a";
                        status.innerText = "Yeh number pehle se registered hai! Login kijiye.";
                        submitBtn.disabled = false;
                        return;
                    }

                    const docRef = await addDoc(collection(db, "users"), {
                        userName: name,
                        userPhone: phone,
                        userAddress: address,
                        createdAt: new Date().toISOString()
                    });

                    status.style.color = "#00ff66";
                    status.innerText = "Registration Successful! Redirecting... 🚀";

                    setTimeout(() => {
                        window.location.href = `user_dashboard.html?uid=${docRef.id}&name=${encodeURIComponent(name)}`;
                    }, 1200);

                } catch (error) {
                    status.style.color = "#ff4a4a";
                    status.innerText = "Registration Error: " + error.message;
                    submitBtn.disabled = false;
                }
            }
        }
    </script>
</body>
</html>

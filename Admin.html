<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Delivery - Store Partner & Admin Panel</title>
    <style>
        /* Premium Corporate Blue Theme */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            padding: 0; 
            background: linear-gradient(135deg, #0b1e36, #1f3754, #2e4b6e); 
            color: white;
            min-height: 100vh;
        }

        /* Container Layout */
        .admin-container {
            max-width: 700px;
            margin: 0 auto;
            padding: 20px 15px;
        }

        /* Top Header Board */
        .top-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }
        h1 { margin: 0; font-size: 22px; color: #f7d100; text-shadow: 0 2px 10px rgba(247, 209, 0, 0.2); }
        .store-badge { font-size: 12px; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 8px; font-weight: bold; }

        /* 🚨 Live Alarm Box 🚨 */
        .alarm-box { 
            background: #ff4a4a; 
            color: white; 
            padding: 12px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            text-align: center; 
            font-weight: 800; 
            font-size: 14px;
            box-shadow: 0 0 20px rgba(255,74,74,0.4);
            display: none; 
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.02); } }

        /* Analytics Grid Matrix */
        .analytics-matrix {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 15px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .stat-card span { display: block; font-size: 11px; font-weight: 600; opacity: 0.7; text-transform: uppercase; margin-bottom: 5px; color: #ddd; }
        .stat-card strong { font-size: 20px; color: #00e0ff; font-weight: 800; }

        /* Orders Distribution Board */
        .orders-panel {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .panel-heading { 
            font-size: 16px; 
            font-weight: 800; 
            color: #ffdd57; 
            margin-bottom: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .live-pulse { width: 10px; height: 10px; background: #00ff66; border-radius: 50%; box-shadow: 0 0 10px #00ff66; display: inline-block; }

        /* Order Cards Styling */
        .order-card {
            background: white;
            color: #111;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
            border-left: 6px solid #ffc107;
        }
        .order-card.accepted { border-left-color: #0c9c0c; }

        .order-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .customer-title { font-weight: 800; font-size: 16px; color: #0b1e36; }
        .total-bill { font-weight: 800; color: #0c9c0c; font-size: 17px; }

        .customer-info { font-size: 13px; color: #4a5568; margin: 3px 0; line-height: 1.4; }
        .items-bucket { background: #f1f3f6; padding: 10px; border-radius: 10px; font-size: 13px; margin: 10px 0; color: #2d3748; }

        /* Google Maps Live 3D Link */
        .map-anchor { 
            color: #007bff; 
            font-weight: 700; 
            text-decoration: none; 
            font-size: 13px; 
            display: inline-flex; 
            align-items: center; 
            gap: 4px;
            margin: 5px 0 12px 0;
            border: 1px dashed #007bff;
            padding: 6px 12px;
            border-radius: 8px;
            background: rgba(0,123,255,0.05);
        }
        .map-anchor:hover { background: rgba(0,123,255,0.1); }

        /* 3D Action Push Buttons */
        .action-row { display: flex; justify-content: space-between; margin-top: 12px; }
        .btn-action {
            background: linear-gradient(180deg, #0c9c0c, #087308); 
            color: white; 
            border: none; 
            padding: 12px;
            border-radius: 10px; 
            font-weight: 700; 
            cursor: pointer; 
            width: 100%; 
            box-shadow: 0 3px 0 #054a05;
            transition: all 0.1s ease;
            font-size: 14px;
        }
        .btn-action.complete { background: linear-gradient(180deg, #00e0ff, #007bff); box-shadow: 0 3px 0 #0056b3; }
        .btn-action:active { transform: translateY(2px); box-shadow: none; }
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="top-bar">
            <div>
                <h1 id="lblStoreName">Connecting Hub...</h1>
                <div style="margin-top:4px;"><span class="store-badge">ID: <span id="lblStoreId">None</span></span></div>
            </div>
            <div style="text-align: right;">
                <div style="font-size: 11px; opacity: 0.7;">Siren System</div>
                <strong style="color: #00ff66; font-size:13px;">LIVE MONITORING</strong>
            </div>
        </div>

        <div id="alarmAlert" class="alarm-box">🚨 NEW INCOMING ORDER RECEIVED! ALARM RINGING...</div>

        <div class="analytics-matrix">
            <div class="stat-card"><span>Total Income (Earned)</span><strong id="statIncome">₹0</strong></div>
            <div class="stat-card"><span>Total Orders (Lifetime)</span><strong id="statTotalOrders">0</strong></div>
            <div class="stat-card"><span>Today Orders</span><strong id="statTodayOrders">0</strong></div>
            <div class="stat-card"><span>Week Orders</span><strong id="statWeekOrders">0</strong></div>
        </div>

        <div class="orders-panel">
            <div class="panel-heading">
                <span>📦 Active Live Orders</span>
                <span class="live-pulse"></span>
            </div>
            <div id="ordersContainer">Searching for live orders streams from cloud...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 🔥 Standard Same Config Keys
        const firebaseConfig = {
            apiKey: "AIzaSyCekLRfgBi_HBJJmHLqsgj4b5II4CT6Iuw",
            authDomain: "store-2613b.firebaseapp.com",
            projectId: "store-2613b",
            storageBucket: "store-2613b.firebasestorage.app",
            messagingSenderId: "216192871587",
            appId: "1:216192871587:web:431c15db165045d8c42316"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // URL parsing logic dukan id verification ke liye
        const urlParams = new URLSearchParams(window.location.search);
        const currentStoreId = urlParams.get('sid');

        // Professional Loop Audio Notification Beep
        const alarmAudio = new Audio("https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg");
        alarmAudio.loop = true; 

        window.addEventListener('DOMContentLoaded', async () => {
            if(!currentStoreId) {
                alert("Store Credentials Missing! Open via Portal Login.");
                return;
            }
            document.getElementById('lblStoreId').innerText = currentStoreId;
            
            // Sync Hub Header Details
            const storeDoc = await getDoc(doc(db, "stores", currentStoreId));
            if(storeDoc.exists()) {
                document.getElementById('lblStoreName').innerText = storeDoc.data().storeName;
            }

            // Fire up the real-time Firebase connection loop
            initLiveOrderEngine();
        });

        function initLiveOrderEngine() {
            // Target specific order query filtered for this store only
            const q = query(collection(db, "orders"), where("storeId", "==", currentStoreId));
            
            onSnapshot(q, (snapshot) => {
                let totalIncome = 0;
                let totalCount = 0;
                let todayCount = 0;
                let weekCount = 0;
                let cardsHtml = "";
                let activateSiren = false;

                const rightNow = new Date();

                snapshot.forEach((docSnap) => {
                    const order = docSnap.data();
                    const orderId = docSnap.id;
                    const orderDate = new Date(order.createdAt);

                    // Income stream parsing
                    if(order.status === "Completed") {
                        totalIncome += Number(order.totalBill);
                    }
                    totalCount++;

                    // Today & Weekly filters checking
                    const diffTime = Math.abs(rightNow - orderDate);
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                    if(orderDate.toDateString() === rightNow.toDateString()) todayCount++;
                    if(diffDays <= 7) weekCount++;

                    // Active screen logic updates for Pending/Accepted states
                    if(order.status === "Pending" || order.status === "Accepted") {
                        if(order.status === "Pending") activateSiren = true;

                        let itemsListText = order.items.map(i => `${i.name} (x${i.qty})`).join(', ');
                        
                        // Exact link generation to track user coordinates on standard map grid
                        let mapUrl = `https://www.google.com/maps/search/?api=1&query=${order.userLat},${order.userLng}`;

                        cardsHtml += `
                            <div class="order-card ${order.status === 'Accepted' ? 'accepted' : ''}">
                                <div class="order-header">
                                    <span class="customer-title">👤 Name: ${order.userName}</span>
                                    <span class="total-bill">₹${order.totalBill}</span>
                                </div>
                                <div class="customer-info"><strong>📞 Phone:</strong> ${order.userPhone}</div>
                                <div class="customer-info"><strong>📍 Address:</strong> ${order.userAddress}</div>
                                
                                <a href="${mapUrl}" target="_blank" class="map-anchor">📍 Open User Live Location on Maps</a>
                                
                                <div class="items-bucket"><strong>Basket:</strong> ${itemsListText}</div>
                                <div class="action-row">
                                    ${order.status === 'Pending' ? 
                                        `<button class="btn-action" onclick="changeStatus('${orderId}', 'Accepted')">Accept Order & Stop Alarm</button>` :
                                        `<button class="btn-action complete" onclick="changeStatus('${orderId}', 'Completed')">Complete Delivery & Close</button>`
                                    }
                                </div>
                            </div>
                        `;
                    }
                });

                // Render dynamic stream dashboard calculations
                document.getElementById('statIncome').innerText = "₹" + totalIncome;
                document.getElementById('statTotalOrders').innerText = totalCount;
                document.getElementById('statTodayOrders').innerText = todayCount;
                document.getElementById('statWeekOrders').innerText = weekCount;

                if(cardsHtml !== "") {
                    document.getElementById('ordersContainer').innerHTML = cardsHtml;
                } else {
                    document.getElementById('ordersContainer').innerText = "No active orders pending for processing.";
                }

                // Global Sirens Controller Engine
                const sirenBox = document.getElementById('alarmAlert');
                if(activateSiren) {
                    sirenBox.style.display = "block";
                    alarmAudio.play().catch(e => console.log("Audio locked. Click dashboard once to activate loops."));
                } else {
                    sirenBox.style.display = "none";
                    alarmAudio.pause();
                }
            });
        }

        // Global status updates event router
        window.changeStatus = async function(orderId, targetStatus) {
            try {
                const docRef = doc(db, "orders", orderId);
                await updateDoc(docRef, { status: targetStatus });
                
                if(targetStatus === "Completed") {
                    alarmAudio.pause();
                    alert("Order processed, closed and added to analytics dashboard system! 🎉");
                }
            } catch(err) {
                alert("Cloud write error: " + err.message);
            }
        }
    </script>
</body>
</html>
